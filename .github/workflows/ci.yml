name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          JS_SIZE=$(du -sb dist/assets/*.js | awk '{sum+=$1} END {print sum}')
          echo "Total JS bundle: $((JS_SIZE / 1024)) KB"
          if [ "$JS_SIZE" -gt 2097152 ]; then
            echo "::warning::JS bundle exceeds 2MB ($((JS_SIZE / 1024)) KB)"
          fi
